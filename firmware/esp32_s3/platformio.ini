; ============================================================================
;  CardioVest / CardioCore V1 - ESP32-S3 firmware
;  Research / education only. NOT a medical device.
; ============================================================================
; Target module: ESP32-S3-WROOM-1-N16R8 (16 MB flash, 8 MB OPI PSRAM, native USB)
; Until a custom board JSON for CardioCore V1 is created, we build against the
; generic esp32-s3-devkitc-1 definition (same MCU/module family).

[platformio]
default_envs = cardiocore_v1

[env:cardiocore_v1]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

; ESP32-S3-WROOM-1-N16R8 flash/PSRAM + native USB CDC
board_build.flash_mode   = qio
board_build.psram_type   = opi
board_upload.flash_size  = 16MB
board_build.partitions   = default_16MB.csv

; --- USB / serial console ---------------------------------------------------
; This board (e.g. Lonely Binary ESP32-S3 N16R8) has TWO USB-C ports:
;   * UART bridge  -> reliable flashing + serial, auto-reset (USE THIS by default)
;   * native USB   -> ESP32-S3 built-in USB (GPIO19/20)
; CDC_ON_BOOT=0 routes Serial to the UART bridge, so one cable on the UART port
; does both flash and monitor. To use the NATIVE USB port for the console
; instead, set ARDUINO_USB_CDC_ON_BOOT=1 (then flash via UART, monitor via USB).
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D BOARD_HAS_PSRAM
    -D CORE_DEBUG_LEVEL=3

; BLE stack: NimBLE (lighter than Bluedroid, good for streaming).
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.1
